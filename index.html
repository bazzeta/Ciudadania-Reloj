<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05070b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Citizenship Watch</title>
  <style>
    :root{
      --bg:#05070b; --card:#121722; --card2:#192232; --line:#2c3546;
      --text:#f8fafc; --muted:#aeb8c8; --blue:#38bdf8; --green:#22c55e;
      --amber:#fbbf24; --red:#fb7185; --shadow:rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
    body{background:radial-gradient(circle at 50% 10%, #182033 0%, #05070b 60%);}
    button{font-family:inherit;cursor:pointer;border:0;touch-action:manipulation;color:inherit}
    .screen{height:100dvh;width:100vw;overflow:hidden;position:relative;}
    .hidden{display:none!important}

    /* Inicio pensado para pantalla redonda: todo queda lejos de las esquinas */
    .home{height:100dvh;display:flex;align-items:center;justify-content:center;padding:42px 46px;}
    .home-inner{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:18px;}
    .brand{text-align:center;margin-bottom:2px;}
    .brand-title{font-size:26px;line-height:1.05;font-weight:950;letter-spacing:.3px;}
    .brand-sub{margin-top:6px;color:var(--muted);font-size:15px;font-weight:800;}
    .home-btn{width:100%;min-height:132px;border-radius:34px;padding:18px 18px;box-shadow:0 14px 34px var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;text-align:center;}
    .home-btn .big{font-size:24px;line-height:1.05;font-weight:1000;letter-spacing:.6px;}
    .home-btn .small{font-size:15px;line-height:1.2;font-weight:850;opacity:.9;}
    .home-random{background:linear-gradient(135deg,#1d4ed8,#0891b2);}
    .home-learn{background:linear-gradient(135deg,#15803d,#16a34a);}

    /* Vista pregunta */
    .study{height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding:28px 34px 176px;}
    .top{height:48px;width:min(62vw,300px);margin:0 auto;display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0;}
    .top-btn{height:44px;min-width:76px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:15px;font-weight:950;}
    .mode-title{text-align:center;min-width:0;flex:1;}
    .mode-title .label{font-size:14px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.7px;}
    .mode-title .count{font-size:18px;color:#dbeafe;font-weight:1000;line-height:1.1;}
    .scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:10px 0 8px;}
    .scroll::-webkit-scrollbar{display:none}
    .q-card{background:rgba(18,23,34,.94);border:1px solid rgba(255,255,255,.10);border-radius:30px;padding:24px 22px;box-shadow:0 18px 42px var(--shadow);}
    .q-section{display:inline-flex;max-width:100%;border-radius:999px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.22);color:#bae6fd;font-size:13px;font-weight:900;padding:6px 10px;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .question{font-size:29px;line-height:1.16;font-weight:1000;letter-spacing:.1px;}
    .question-es{margin-top:14px;color:#d8b4fe;background:rgba(124,58,237,.13);border:1px solid rgba(167,139,250,.18);border-radius:20px;padding:12px;font-size:18px;line-height:1.22;font-weight:850;}
    .hint{margin-top:13px;color:var(--muted);font-size:14px;line-height:1.25;font-weight:850;}
    .answer-card{margin-top:14px;background:rgba(22,101,52,.18);border:1px solid rgba(34,197,94,.28);border-radius:28px;padding:20px;}
    .answer-title{font-size:15px;color:#bbf7d0;font-weight:1000;margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px;}
    .simple-answer{font-size:29px;line-height:1.14;font-weight:1000;color:#fff;}
    .answer-note{margin-top:10px;color:#d1fae5;font-size:15px;line-height:1.25;font-weight:850;}
    .answer-list{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
    .answer-row{width:100%;border-radius:20px;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.24);padding:14px 14px;text-align:left;font-size:27px;line-height:1.14;font-weight:1000;color:#ecfdf5;display:flex;gap:10px;align-items:flex-start;}
    .answer-row .num{flex:0 0 auto;min-width:32px;height:32px;border-radius:11px;background:rgba(34,197,94,.18);display:flex;align-items:center;justify-content:center;color:#86efac;font-size:17px;font-weight:1000;}
    .answer-row .txt{flex:1;min-width:0;}

    /* Barra inferior con botones grandes y centrales para pantalla redonda */
    .bottom{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(68vw,330px);display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:50;}
    .bottom-btn{height:62px;border-radius:22px;font-size:16px;line-height:1;font-weight:1000;box-shadow:0 12px 28px var(--shadow);display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;}
    .audio{background:#1d4ed8;}
    .show{background:#15803d;}
    .prev{background:#4b5563;}
    .next{background:#374151;}
    .show.on{background:#b45309;}

    .toast{position:fixed;left:50%;top:22px;transform:translateX(-50%);max-width:78vw;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.16);padding:10px 14px;border-radius:999px;font-size:14px;font-weight:900;color:#fff;z-index:99;text-align:center;}

    /* Ajustes para relojes o ventanas muy pequeñas */
    @media(max-width:520px){
      .home{padding:44px 52px;}
      .brand-title{font-size:25px;}
      .home-btn{min-height:130px;border-radius:34px;}
      .home-btn .big{font-size:23px;}
      .study{padding:25px 42px 174px;}
      .top{height:44px;}
      .top{width:min(58vw,292px);}
      .top-btn{height:42px;min-width:70px;font-size:14px;}
      .mode-title .label{font-size:12px;}
      .mode-title .count{font-size:17px;}
      .q-card{border-radius:28px;padding:22px 20px;}
      .question{font-size:27px;}
      .question-es{font-size:17px;}
      .simple-answer{font-size:27px;}
      .answer-row{font-size:25px;}
      .bottom{bottom:22px;width:68vw;gap:9px;}
      .bottom-btn{height:61px;border-radius:22px;font-size:15px;}
    }
    @media(max-width:390px){
      .home{padding:34px 32px;}
      .home-btn{min-height:112px;border-radius:28px;}
      .home-btn .big{font-size:20px;}
      .brand-title{font-size:22px;}
      .study{padding:18px 26px 156px;}
      .question{font-size:23px;}
      .question-es{font-size:15px;}
      .simple-answer{font-size:23px;}
      .answer-row{font-size:23px;}
      .bottom{width:74vw;bottom:16px;gap:8px;}
      .bottom-btn{height:56px;border-radius:19px;font-size:13px;}
    }
  </style>
</head>
<body>
  <div id="home" class="screen home">
    <div class="home-inner">
      <div class="brand">
        <div class="brand-title">Citizenship<br>Watch</div>
        <div class="brand-sub">128 preguntas · audio + respuestas</div>
      </div>
      <button class="home-btn home-random" onclick="startMode('random')" aria-label="Preguntas aleatorias">
        <span class="big">PREGUNTAS<br>ALEATORIAS</span>
        <span class="small">todas mezcladas</span>
      </button>
      <button class="home-btn home-learn" onclick="startMode('learn')" aria-label="Aprender">
        <span class="big">APRENDER</span>
        <span class="small">pregunta por pregunta</span>
      </button>
    </div>
  </div>

  <div id="study" class="screen study hidden">
    <div class="top">
      <button class="top-btn" onclick="goHome()">INICIO</button>
      <div class="mode-title">
        <div id="mode-label" class="label">APRENDER</div>
        <div id="counter" class="count">1 / 128</div>
      </div>
    </div>

    <div id="scroll" class="scroll">
      <div class="q-card">
        <div id="section" class="q-section"></div>
        <div id="question" class="question"></div>
        <div id="question-es" class="question-es"></div>
        <div id="hint" class="hint"></div>
      </div>
      <div id="answer-card" class="answer-card hidden">
        <div class="answer-title">Respuesta</div>
        <div id="simple-answer" class="simple-answer"></div>
        <div id="answer-note" class="answer-note"></div>
        <div id="answer-list" class="answer-list"></div>
      </div>
    </div>

    <div class="bottom">
      <button class="bottom-btn audio" onclick="speakQuestion()">ESCUCHAR</button>
      <button id="show-btn" class="bottom-btn show" onclick="toggleAnswer()">VER</button>
      <button class="bottom-btn prev" onclick="prevQuestion()">ANTERIOR</button>
      <button class="bottom-btn next" onclick="nextQuestion()">SIGUIENTE</button>
    </div>
  </div>

function escapeHtml(v){ return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function cleanForSpeech(v){ return String(v ?? '').replace(/\[[\s\S]*?\]/g,'').replace(/[()]/g,'').replace(/\s+/g,' ').trim(); }
function loadSettings(){
  try {
    const full = JSON.parse(localStorage.getItem('civicsCoachState') || '{}');
    return {...DEFAULT_SETTINGS, ...(full.settings || {})};
  } catch(e) { return DEFAULT_SETTINGS; }
}
function answersFor(q){
  const s = loadSettings();
  if(q.id===23) return [s.senator1, s.senator2].filter(Boolean);
  if(q.id===29) return [s.representative || 'Add your U.S. Representative'];
  if(q.id===30) return [s.speaker];
  if(q.id===38) return [s.president];
  if(q.id===39) return [s.vicePresident];
  if(q.id===57) return [s.chiefJustice];
  if(q.id===61) return [s.governor];
  if(q.id===62) return [s.stateCapital];
  return q.answers.slice();
}
function simpleAnswer(q){
  const required = Math.max(1, Number(q.required || 1));
  return answersFor(q).slice(0, required).join('; ');
}
function requirementText(q){
  const required = Math.max(1, Number(q.required || 1));
  const total = answersFor(q).length;
  if(required > 1) return `Esta pregunta pide ${required} respuestas. Puedes elegir ${required} de la lista.`;
  return total > 1 ? 'Con una respuesta correcta es suficiente.' : 'Respuesta oficial corta.';
}
function currentQuestion(){
  if(index < 0 || index >= QUESTIONS.length) index = 0;
  return QUESTIONS[index];
}
function startMode(newMode){
  mode = newMode;
  answerVisible = false;
  if(mode === 'random') {
    index = Math.floor(Math.random() * QUESTIONS.length);
    randomHistory = [index];
  }
  $('home').classList.add('hidden');
  $('study').classList.remove('hidden');
  render();
}
function goHome(){
  try { if(synth) synth.cancel(); } catch(e){}
  $('study').classList.add('hidden');
  $('home').classList.remove('hidden');
}
function render(){
  const q = currentQuestion();
  $('mode-label').textContent = mode === 'random' ? 'ALEATORIAS' : 'APRENDER';
  $('counter').textContent = `${q.id} / ${QUESTIONS.length}`;
  $('section').textContent = (q.categoryEs || q.category || '').replace('Gobierno estadounidense','Gobierno').replace('Historia estadounidense','Historia');
  $('question').textContent = q.q;
  $('question-es').textContent = q.qEs || '';
  $('hint').textContent = q.required > 1 ? `Ojo: esta pide ${q.required} respuestas.` : 'Toca ESCUCHAR para oír la pregunta.';
  $('simple-answer').textContent = simpleAnswer(q);
  $('answer-note').textContent = requirementText(q);
  $('answer-list').innerHTML = answersFor(q).map((a, i) => `
    <button class="answer-row" onclick="speakText('${encodeURIComponent(cleanForSpeech(a))}')">
      <span class="num">${i+1}</span><span class="txt">${escapeHtml(a)}</span>
    </button>`).join('');
  $('answer-card').classList.toggle('hidden', !answerVisible);
  $('show-btn').textContent = answerVisible ? 'OCULTAR' : 'VER';
  $('show-btn').classList.toggle('on', answerVisible);
  localStorage.setItem('cw_seq_index', String(index));
  setTimeout(() => $('scroll').scrollTo({top:0, behavior:'smooth'}), 20);
}
function nextQuestion(){
  answerVisible = false;
  if(mode === 'random') {
    let next = Math.floor(Math.random() * QUESTIONS.length);
    if(QUESTIONS.length > 1 && next === index) next = (next + 1) % QUESTIONS.length;
    index = next;
    randomHistory.push(index);
    if(randomHistory.length > 80) randomHistory.shift();
  } else {
    index = (index + 1) % QUESTIONS.length;
  }
  render();
}
function prevQuestion(){
  answerVisible = false;
  if(mode === 'random') {
    if(randomHistory.length > 1) {
      randomHistory.pop();
      index = randomHistory[randomHistory.length - 1];
    } else {
      showToast('No hay anterior');
      return;
    }
  } else {
    index = (index - 1 + QUESTIONS.length) % QUESTIONS.length;
  }
  render();
}
function toggleAnswer(){
  answerVisible = !answerVisible;
  render();
  if(answerVisible) setTimeout(() => $('answer-card').scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
}
function loadVoices(){
  if(!synth) return;
  const voices = synth.getVoices ? synth.getVoices() : [];
  selectedVoice = voices.find(v => /en[-_]US/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang)) || voices[0] || null;
}
function speakText(encoded){
  const text = decodeURIComponent(encoded || '');
  if(!text) return;
  if(!synth) { showToast('Audio no disponible'); return; }
  try {
    synth.cancel();
    loadVoices();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.82;
    u.pitch = 1;
    if(selectedVoice) u.voice = selectedVoice;
    synth.speak(u);
  } catch(e) { showToast('No pude reproducir audio'); }
}
function speakQuestion(){ speakText(encodeURIComponent(cleanForSpeech(currentQuestion().q))); }
function speakAnswer(){ speakText(encodeURIComponent(cleanForSpeech(simpleAnswer(currentQuestion())))); }
function showToast(msg){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}
window.speechSynthesis && (window.speechSynthesis.onvoiceschanged = loadVoices);
window.addEventListener('load', loadVoices);
</script>
</body>
